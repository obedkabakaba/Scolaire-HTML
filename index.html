<style>
  :root {
    --ardoise: #1F2B24;
    --ardoise-2: #263129;
    --craie: #F6F2E7;
    --craie-2: #FBF9F3;
    --ocre: #C98A3E;
    --ocre-dark: #A96F2E;
    --encre: #3C5A62;
    --rouge: #B23A2E;
    --ligne: rgba(246, 242, 231, 0.07);
    --texte-sombre: #1F2B24;
    --texte-att: #6B7269;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: var(--texte-sombre);
    background: var(--craie);
  }

  .ecran {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
  }

  @media (max-width: 860px) {
    .ecran { grid-template-columns: 1fr; }
  }

  /* ---------- Panneau de gauche (identité) ---------- */
  .panneau-marque {
    position: relative;
    background: var(--ardoise);
    color: var(--craie);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8vh 7vw;
    overflow: hidden;
  }

  .panneau-marque::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 47px,
      var(--ligne) 47px, var(--ligne) 48px
    );
    pointer-events: none;
  }

  @media (max-width: 860px) {
    .panneau-marque { padding: 6vh 7vw; min-height: 38vh; justify-content: flex-end; }
  }

  .logo-complet {
    display: block;
    width: 300px;
    max-width: 62vw;
    height: auto;
    margin-bottom: 20px;
  }

  .marque-slogan {
    font-size: 1.05rem;
    max-width: 30ch;
    color: rgba(246, 242, 231, 0.72);
    line-height: 1.55;
    margin: 0;
  }

  .marque-pied {
    position: relative;
    margin-top: 56px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(246, 242, 231, 0.4);
  }

  @media (max-width: 860px) { .marque-pied { display: none; } }

  /* ---------- Panneau de droite (formulaire) ---------- */
  .panneau-form {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 7vw;
  }

  .carte {
    width: 100%;
    max-width: 380px;
  }

  .carte h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.7rem;
    margin: 0 0 6px 0;
  }

  .carte .sous-titre {
    color: var(--texte-att);
    font-size: 0.95rem;
    margin: 0 0 36px 0;
  }

  .champ { margin-bottom: 20px; }

  .champ label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--texte-att);
    margin-bottom: 7px;
  }

  .champ input {
    width: 100%;
    padding: 12px 14px;
    font-size: 0.98rem;
    font-family: 'Inter', sans-serif;
    border: 1.5px solid #DDD6C5;
    border-radius: 7px;
    background: var(--craie-2);
    color: var(--texte-sombre);
    transition: border-color 0.15s ease;
  }

  .champ input#code_ecole {
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.02em;
  }

  .champ input:focus {
    outline: none;
    border-color: var(--encre);
    box-shadow: 0 0 0 3px rgba(60, 90, 98, 0.15);
  }

  .champ-mdp { position: relative; }
  .bouton-oeil {
    position: absolute;
    right: 10px;
    top: 38px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    color: var(--encre);
    font-weight: 500;
    padding: 4px 6px;
  }
  .bouton-oeil:focus-visible { outline: 2px solid var(--encre); outline-offset: 2px; border-radius: 4px; }

  .bouton-connexion {
    width: 100%;
    padding: 13px;
    margin-top: 8px;
    background: var(--ocre);
    color: var(--craie-2);
    border: none;
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .bouton-connexion:hover { background: var(--ocre-dark); }
  .bouton-connexion:active { transform: translateY(1px); }
  .bouton-connexion:focus-visible { outline: 2px solid var(--ardoise); outline-offset: 2px; }
  .bouton-connexion:disabled { opacity: 0.6; cursor: not-allowed; }

  .message-erreur {
    display: none;
    margin: -6px 0 20px 0;
    padding: 10px 12px;
    font-size: 0.87rem;
    color: var(--rouge);
    border-left: 2.5px solid var(--rouge);
    background: rgba(178, 58, 46, 0.06);
    line-height: 1.4;
  }
  .message-erreur.visible { display: block; }

  .message-succes {
    display: none;
  }
  .message-succes.visible {
    display: block;
    text-align: center;
  }
  .message-succes .coche {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ardoise);
    color: var(--craie);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px auto;
    font-size: 1.3rem;
  }
  .message-succes h2 { margin-bottom: 8px; }
  .message-succes p { color: var(--texte-att); font-size: 0.95rem; }

  @media (prefers-reduced-motion: no-preference) {
    .carte { animation: apparition 0.5s ease both; }
    @keyframes apparition {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>

<!-- Filtre SVG donnant la texture "craie" au wordmark/icône (signature visuelle de la page) -->
<svg width="0" height="0" style="position:absolute">
  <filter id="texture-craie">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="bruit" seed="7"/>
    <feDisplacementMap in="SourceGraphic" in2="bruit" scale="1.6"/>
  </filter>
</svg>

<div class="ecran">

    <p class="marque-slogan">Le registre numérique de votre école — élèves, notes et bulletins, sans le désordre du papier.</p>
    <div class="marque-pied">Plateforme de gestion scolaire — RDC</div>
  </div>

  <!-- Panneau de droite : formulaire de connexion -->
  <div class="panneau-form">
    <div class="carte">

      <form id="formulaire-connexion" novalidate>
        <h2>Connexion</h2>
        <p class="sous-titre">Entrez les identifiants fournis par votre école.</p>

        <div class="message-erreur" id="zone-erreur" role="alert"></div>

        <div class="champ">
          <label for="code_ecole">Code de l'école</label>
          <input type="text" id="code_ecole" name="code_ecole" placeholder="ex. college-boboto" autocomplete="organization" />
        </div>

        <div class="champ">
          <label for="email">Adresse email</label>
          <input type="email" id="email" name="email" placeholder="vous@ecole.cd" autocomplete="username" required />
        </div>

        <div class="champ champ-mdp">
          <label for="mot_de_passe">Mot de passe</label>
          <input type="password" id="mot_de_passe" name="mot_de_passe" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="bouton-oeil" id="bouton-oeil" aria-label="Afficher le mot de passe">Afficher</button>
        </div>

        <button type="submit" class="bouton-connexion" id="bouton-connexion">Se connecter</button>
      </form>

      <div class="message-succes" id="zone-succes">
        <div class="coche">✓</div>
        <h2 id="succes-titre">Connexion réussie</h2>
        <p id="succes-detail">Bienvenue. Le tableau de bord arrive dans une prochaine étape.</p>
      </div>

    </div>
  </div>

</div>

<script>
  // URL du backend en production.
  const API_BASE_URL = "https://scolaire-saas-backend.onrender.com";

  const formulaire = document.getElementById('formulaire-connexion');
  const zoneErreur = document.getElementById('zone-erreur');
  const zoneSucces = document.getElementById('zone-succes');
  const boutonConnexion = document.getElementById('bouton-connexion');
  const boutonOeil = document.getElementById('bouton-oeil');
  const champMotDePasse = document.getElementById('mot_de_passe');

  boutonOeil.addEventListener('click', () => {
    const visible = champMotDePasse.type === 'text';
    champMotDePasse.type = visible ? 'password' : 'text';
    boutonOeil.textContent = visible ? 'Afficher' : 'Masquer';
  });

  function afficherErreur(message) {
    zoneErreur.textContent = message;
    zoneErreur.classList.add('visible');
  }

  function masquerErreur() {
    zoneErreur.classList.remove('visible');
  }

  formulaire.addEventListener('submit', async (evenement) => {
    evenement.preventDefault();
    masquerErreur();

    const codeEcole = document.getElementById('code_ecole').value.trim();
    const email = document.getElementById('email').value.trim();
    const motDePasse = champMotDePasse.value;

    boutonConnexion.disabled = true;
    boutonConnexion.textContent = 'Connexion en cours…';

    try {
      const reponse = await fetch(`${API_BASE_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email,
          password: motDePasse,
          code_ecole: codeEcole || undefined
        })
      });

      const donnees = await reponse.json();

      if (!reponse.ok) {
        afficherErreur(donnees.message || "Identifiants incorrects. Vérifie le code école, l'email et le mot de passe.");
        boutonConnexion.disabled = false;
        boutonConnexion.textContent = 'Se connecter';
        return;
      }

      // Stockage des tokens pour les prochaines pages (dashboard, etc.).
      // Note : dans l'aperçu intégré au chat, le stockage navigateur peut être
      // limité par le bac à sable — une fois le fichier déployé sur GitHub Pages,
      // ceci fonctionne normalement.
      localStorage.setItem('ardoise_access_token', donnees.access_token);
      localStorage.setItem('ardoise_refresh_token', donnees.refresh_token);
      localStorage.setItem('ardoise_user', JSON.stringify(donnees.user));

      const roles = donnees.user?.roles || [];

      if (roles.includes('directeur')) {
        window.location.href = 'dashboard-directeur.html';
        return;
      }

      formulaire.style.display = 'none';
      zoneSucces.classList.add('visible');
      document.getElementById('succes-detail').textContent = roles.includes('super_admin')
        ? 'Bienvenue, Super Administrateur. Le tableau de bord Super Admin arrive dans une prochaine étape.'
        : 'Bienvenue. Le tableau de bord de ton rôle arrive dans une prochaine étape.';

    } catch (err) {
      console.error(err);
      afficherErreur("Impossible de contacter le serveur. Vérifie ta connexion ou réessaie dans un instant.");
      boutonConnexion.disabled = false;
      boutonConnexion.textContent = 'Se connecter';
    }
  });
</script>

</body>
</html>
