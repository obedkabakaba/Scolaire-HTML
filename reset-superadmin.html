<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ardoise — Réinitialiser le Super Admin</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; color: #1F2B24; }
  h1 { font-size: 1.3rem; }
  input { width: 100%; padding: 10px; margin: 8px 0 16px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; box-sizing: border-box; }
  button { padding: 11px 18px; background: #C98A3E; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; }
  button:disabled { opacity: 0.6; }
  #resultat { margin-top: 18px; padding: 12px; border-radius: 6px; font-size: 0.9rem; display: none; }
  #resultat.ok { background: #e8f3ea; color: #2f6b40; display: block; }
  #resultat.erreur { background: #fbe9e7; color: #b23a2e; display: block; }
  p.note { font-size: 0.85rem; color: #6B7269; }
</style>
</head>
<body>
  <h1>Réinitialiser le compte Super Admin</h1>
  <p class="note">Utilise le secret CRON_SECRET défini sur Render. Une fois que ça a marché, tu peux supprimer ce fichier de ton repo — il n'a pas vocation à rester en ligne.</p>

  <label for="secret">Ton CRON_SECRET (Render)</label>
  <input type="password" id="secret" placeholder="colle ici la valeur exacte" />

  <label for="url-backend">URL de ton backend</label>
  <input type="text" id="url-backend" value="https://scolaire-saas-backend.onrender.com" />

  <button id="bouton" onclick="lancer()">Réinitialiser le Super Admin</button>

  <div id="resultat"></div>

<script>
async function lancer() {
  const bouton = document.getElementById('bouton');
  const resultat = document.getElementById('resultat');
  const secret = document.getElementById('secret').value.trim();
  const url = document.getElementById('url-backend').value.trim();

  if (!secret) { alert('Colle ton CRON_SECRET.'); return; }

  bouton.disabled = true;
  bouton.textContent = 'En cours…';
  resultat.className = '';
  resultat.style.display = 'none';

  try {
    const reponse = await fetch(`${url}/jobs/reset-superadmin`, {
      method: 'POST',
      headers: { 'x-cron-secret': secret }
    });
    const donnees = await reponse.json();

    resultat.textContent = donnees.message;
    resultat.className = reponse.ok ? 'ok' : 'erreur';
  } catch (err) {
    resultat.textContent = 'Impossible de contacter le serveur.';
    resultat.className = 'erreur';
  }

  bouton.disabled = false;
  bouton.textContent = 'Réinitialiser le Super Admin';
}
</script>
</body>
</html>
